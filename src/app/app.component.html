<main class="min-h-screen bg-slate-900 text-white font-sans p-8">

  <section class="flex flex-col items-center justify-center py-20 animate-fade-in">
    <div class="relative group">
      <div
        class="absolute -inset-1 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full blur opacity-40 group-hover:opacity-75 transition duration-1000">
      </div>
      <img src="assets/photo.jfif" class="relative w-32 h-32 rounded-full border-2 border-slate-700 object-cover">
    </div>

    <h1 class="mt-6 text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
      Florent Martinier
    </h1>

    <p class="mt-4 max-w-md text-center text-slate-400">
      Développeur Full Stack Java / Kotlin / Angular. Découvrez mes différents projets.
    </p>

    <a href="https://cv-florent-martinier.netlify.app/" target="_blank"
      class="mt-8 px-6 py-2 bg-white text-black rounded-full font-medium hover:bg-cyan-400 hover:scale-110 transition-all duration-300">
      Voir mon CV
    </a>
  </section>

  <section class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
    <div *ngFor="let project of projects" (mousemove)="handleMove($event, project)" (mouseleave)="resetCard(project)"
      [style.transform]="project.transform"
      class="relative group bg-slate-800/50 border border-slate-700 p-8 rounded-3xl backdrop-blur-xl transition-all duration-200 ease-out cursor-pointer overflow-hidden flex flex-col items-center text-center">

      <div class="z-10 relative flex flex-col items-center">

        <div
          class="mb-6 overflow-hidden rounded-3xl shadow-xl border-4 border-slate-700/50 bg-slate-900 group-hover:border-cyan-500/50 transition-colors duration-300">
          <img [src]="project.image" [alt]="project.title"
            class="w-24 h-24 object-cover group-hover:scale-110 transition-transform duration-500">
        </div>

        <span class="block text-xs font-mono text-cyan-400 uppercase tracking-widest">{{ project.tag }}</span>
        <h3 class="text-2xl font-bold mt-2 text-white">{{ project.title }}</h3>
        <p class="text-slate-400 mt-4 text-sm leading-relaxed max-w-xs">{{ project.description }}</p>

        <a [href]="project.link" target="_blank"
          class="inline-flex items-center mt-8 px-6 py-2.5 bg-slate-700 text-white rounded-full text-sm font-semibold hover:bg-cyan-500 hover:text-slate-900 transition-all duration-300 group-hover:shadow-lg group-hover:shadow-cyan-500/20">
          <!--lucide-icon name="arrow-right" class="ml-2 w-4 h-4"></lucide-icon-->
          <span>Découvrir →</span>
        </a>
      </div>

      <div
        class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-cyan-500/10 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500">
      </div>
    </div>
  </section>

  <footer class="mt-20 pb-10 flex flex-col items-center border-t border-slate-800 pt-10">
    <div class="flex space-x-8 mb-6">

      <a href="https://github.com/FlorentMartinier/" target="_blank"
        class="text-slate-400 hover:text-white transition-colors duration-300 flex flex-col items-center group">
        <div class="p-3 bg-slate-800 rounded-full group-hover:bg-slate-700 mb-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4">
            </path>
            <path d="M9 18c-4.51 2-5-2-7-2"></path>
          </svg>
        </div>
        <span
          class="text-xs font-mono uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">GitHub</span>
      </a>

      <a href="https://www.linkedin.com/in/florent-martinier-151661105/" target="_blank"
        class="text-slate-400 hover:text-blue-400 transition-colors duration-300 flex flex-col items-center group">
        <div class="p-3 bg-slate-800 rounded-full group-hover:bg-slate-700 mb-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
            <rect width="4" height="12" x="2" y="9"></rect>
            <circle cx="4" cy="4" r="2"></circle>
          </svg>
        </div>
        <span
          class="text-xs font-mono uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">LinkedIn</span>
      </a>

      <a href="mailto:florent.martinier@free.fr"
        class="text-slate-400 hover:text-cyan-400 transition-colors duration-300 flex flex-col items-center group">
        <div class="p-3 bg-slate-800 rounded-full group-hover:bg-slate-700 mb-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
          </svg>
        </div>
        <span
          class="text-xs font-mono uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">Contact</span>
      </a>

    </div>
  </footer>
</main>
